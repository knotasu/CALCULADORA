<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
            outline: none;
        }

        body {
            background-color: #000;
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            overflow: hidden;
        }

        .calculadora {
            width: 100vw;
            height: 100vh;
            background-color: #1c1c1c;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        #pantalla {
            flex: 1;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            color: rgb(25, 228, 126);
            padding: 20px;
            font-size: 5rem;
            overflow-x: auto;
            white-space: nowrap;
            background-image: url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 100'%3E%3Ctext x='50%25' y='50%25' text-anchor='middle' dominant-baseline='middle' font-family='cursive, sans-serif' font-size='30' fill='rgba(25, 228, 126, 0.1)'%3EAbraham%3C/text%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: center;
        }

        .botones-calculadora {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding-bottom: 30px;
        }

        button {
            aspect-ratio: 1 / 1;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.8rem;
            font-weight: bold;
            background-color: #333;
            color: white;
            transition: opacity 0.1s;
        }

        button:active {
            opacity: 0.5;
        }

        .operadores {
            background-color: #41b186;
            color: #000;
        }

        .operadores1 {
            background-color: #045f94;
        }

        .borrar {
            background-color: #a5a5a5;
            color: black;
            grid-column: span 4;
            aspect-ratio: auto;
            height: 60px;
            border-radius: 30px;
            margin-bottom: 10px;
        }


        #pantalla::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body>
    <div class="calculadora">
        <div id="pantalla">0</div>
        <div class="botones-calculadora">
            <button class="borrar" onclick="precionarV('c')">c</button>
            <button onclick="precionarN('1')">1</button>
            <button onclick="precionarN('2')">2</button>
            <button onclick="precionarN('3')">3</button>
            <button class="operadores" onclick="precionarV('+')">+</button>
            <button onclick="precionarN('4')">4</button>
            <button onclick="precionarN('5')">5</button>
            <button onclick="precionarN('6')">6</button>
            <button class="operadores" onclick="precionarV('-')">-</button>
            <button onclick="precionarN('7')">7</button>
            <button onclick="precionarN('8')">8</button>
            <button onclick="precionarN('9')">9</button>
            <button class="operadores" onclick="precionarV('x')">x</button>
            <button onclick="precionarN('0')">0</button>
            <button onclick="precionarpunto('.')">.</button>
            <button class="operadores1" onclick="precionarV('=')">=</button>
            <button class="operadores" onclick="precionarV('/')">÷</button>
        </div>

    </div>
    <script>

        let primerValor = 0;
        let primerValor2 = "0";
        let signos = "";
        function moverScroll() {
            const p = document.getElementById('pantalla');
            p.scrollLeft = p.scrollWidth;
        }
        function precionarN(numero) {
            if (primerValor == 0) {
                primerValor = numero;
            } else {
                primerValor = primerValor + numero;
            }
            if (signos == "") {
                document.getElementById('pantalla').innerHTML = primerValor;
            } else if (primerValor === 0) {
                document.getElementById('pantalla').innerHTML = primerValor2 + " " + signos;
            } else {
                document.getElementById('pantalla').innerHTML = primerValor2 + " " + signos + " " + primerValor;
            }
            moverScroll();
        }
        function precionarV(operador) {
            if (operador == "c") {
                primerValor = 0;
                primerValor2 = "0";
                signos = "";
            } else if (operador != "=") {
                primerValor2 = primerValor;
                signos = operador;
                primerValor = 0;
            } else if (operador == "=") {
                if (primerValor == 0) {
                    document.getElementById('pantalla').innerHTML = "NO DEFINIDA LOL XD";
                    return;
                }
                switch (signos) {
                    case "x": primerValor = Number(primerValor2) * Number(primerValor);
                        break;
                    case "/": primerValor = Number(primerValor2) / Number(primerValor);

                        break;
                    case "-": primerValor = Number(primerValor2) - Number(primerValor);
                        break;
                    case "+": primerValor = Number(primerValor2) + Number(primerValor);
                        break;
                    default: "KNOTASU ERROR";
                        break;
                }
                signos = "";
                primerValor2 = "0"


            }
            if (signos == "") {
                document.getElementById('pantalla').innerHTML = primerValor;
            } else if (primerValor === 0) {
                document.getElementById('pantalla').innerHTML = primerValor2 + " " + signos;
            } else {
                document.getElementById('pantalla').innerHTML = primerValor2 + " " + signos + " " + primerValor;
            }

        }
        function precionarpunto(punto) {
            if (!String(primerValor).includes('.')) {
                primerValor = primerValor + punto;
            }
            document.getElementById('pantalla').innerHTML = primerValor;

        }


    </script>
</body>

</html>
